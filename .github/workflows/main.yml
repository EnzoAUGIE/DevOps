name: CI devops 2025

# Ce workflow a été remplacé par test.yml et deploy.yml
# Il est conservé ici pour référence mais ne s'exécute plus automatiquement
# Pour le lancer manuellement : Actions → CI devops 2025 → Run workflow
on:
  # Ancien trigger désactivé - remplacé par test.yml et deploy.yml
  # push:
  #   branches:
  #     - main
  # pull_request:

  # Nouveau trigger : exécution manuelle uniquement
  workflow_dispatch:

jobs:
  # Job 1 : Build et test du backend
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test with Maven
        run: mvn clean verify --file ./TP1-Docker/backend/simpleapi/pom.xml

  # Job 2 : Analyse SonarCloud
  sonarcloud:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=EnzoAUGIE_DevOps -Dsonar.organization=enzoaugie -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} --file ./TP1-Docker/backend/simpleapi/pom.xml

  # Job 3 : Build et push des images Docker
  # Ce job ne se lance que si sonarcloud est passé ET uniquement sur main
  build-and-push-docker-image:
    needs: sonarcloud
    # Ancien trigger désactivé - le if sur main est géré par deploy.yml
    # if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./TP1-Docker/backend/simpleapi
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-backend:latest
          push: true

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./TP1-Docker/database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: true

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./TP1-Docker/httpd
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: true
EOFcat > ~/DevOps/.github/workflows/main.yml << 'EOF'
