name: CI devops 2025
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      # Récupère le code de ton repo
      - uses: actions/checkout@v4

      # Configure Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Build et tests avec Maven
      - name: Build and test with Maven
        run: mvn clean verify --file ./TP1-Docker/backend/simpleapi/pom.xml
