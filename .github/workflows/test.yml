name: Test Backend

on:
  # Lance sur main et develop
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  # Job 1 : Build et test du backend
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test with Maven
        run: mvn clean verify --file ./TP1-Docker/backend/simpleapi/pom.xml

  # Job 2 : Analyse SonarCloud
  sonarcloud:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=EnzoAUGIE_DevOps -Dsonar.organization=enzoaugie -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} --file ./TP1-Docker/backend/simpleapi/pom.xml
