services:
    backend:
        build: ./backend/simpleapi
        networks:
            - front-network
            - back-network
        depends_on:
            - database
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    database:
        build: ./database
        networks:
            - back-network
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - db-data:/var/lib/postgresql/data

    httpd:
        build: ./httpd
        ports:
            - "80:80"
        networks:
            - front-network
        depends_on:
            - backend

networks:
    front-network:
    back-network:

volumes:
    db-data:
