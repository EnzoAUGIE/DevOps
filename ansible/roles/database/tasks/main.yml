---
# Lancer le container PostgreSQL
- name: Launch database
  community.docker.docker_container:
    name: database
    image: enzoaugie/tp-devops-database:latest
    networks:
      - name: back-network
    env:
      POSTGRES_DB: "{{ postgres_db }}"
      POSTGRES_USER: "{{ postgres_user }}"
      POSTGRES_PASSWORD: "{{ postgres_password }}"
    volumes:
      - db-data:/var/lib/postgresql/data
    state: started
    recreate: true
    # pull: true
    # Décommenter pour forcer le téléchargement de la dernière image depuis Docker Hub
    # à chaque déploiement, évitant ainsi de supprimer manuellement l'ancienne image
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python
